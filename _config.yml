# OpenSSF Project Community — Site Configuration

title: OpenSSF Project Community
description: >-
  Browse OpenSSF projects by the role you play. Every project is mapped to the
  personas it serves and the problems it solves, with a one-sentence,
  role-specific usage guide for each.

url: "https://tools.openssf.org"

titles_from_headings:
  enabled:     true
  strip_title: true

# Author/Project info (displayed in footer)
author:
  name: OpenSSF contributors
  email: operations@openssf.org

# Build settings.
#
# NOTE: `theme:` below is the Jekyll config key naming the base theme GEM. It is
# unrelated to the theme/ DIRECTORY in this repo, which is our own source. The
# two just share a word.
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Where things live. Two directories, and that is the whole repo:
#
#   data/   the content — the only thing most contributors ever edit.
#   theme/  everything that turns it into a website: layouts, includes, plugins,
#           the hand-written pages, and assets.
#
# theme/assets/** is published at /assets/** by theme/_plugins/theme_assets.rb,
# which exists solely so assets don't have to sit at the repo root. See that file.
data_dir: data
layouts_dir: theme/_layouts
includes_dir: theme/_includes
plugins_dir: theme/_plugins

# Jekyll's Sass converter emits TWO files from one .scss source: the stylesheet
# and a .css.map. Both are derived from the same page, so both honour the
# `permalink:` that theme/assets/css/style.scss needs — and the sourcemap, written
# second, would overwrite the stylesheet with JSON. The site would deploy with no
# CSS. Turning sourcemaps off is the fix, and it also stops shipping ~54KB of
# mapping data to every visitor. Do not re-enable this without giving the
# stylesheet a different home.
sass:
  sourcemap: never

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md
  - CLAUDE.md
  - CHARTER.md
  - SECURITY.md
  - LICENSE
  - Makefile
  # data/ is read via data_dir. Without this it would ALSO be walked as content
  # and copied verbatim into the built site, because Jekyll only auto-skips
  # directories whose name starts with "_".
  - data

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# GitHub metadata
repository: ossf/community
github:
  is_project_page: true

show_excerpts: false

# Social Media Links (rendered via FontAwesome in footer)
social_links:
  - icon: github
    url: "https://github.com/ossf"
  - icon: x-twitter
    url: "https://x.com/openssf"
  - icon: bluesky
    url: "https://bsky.app/profile/openssf.org"
  - icon: linkedin
    url: "https://www.linkedin.com/company/openssf/"

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  toc_levels: "2"
