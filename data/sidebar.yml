# Sidebar tree.
#
# Catalog sections are NOT listed by hand — they set `derive:` and their children
# are generated from the data files by _includes/sidebar.html, so they can never
# drift from the catalog. (They did: this file previously listed 32 projects,
# including bomctl, gemara, gittuf and sbomit twice each, and several titles had
# fallen out of sync with the names in projects.yml.)
#
#   derive: personas | problems | projects | artifacts
#     -> children are every record in that data file, titled by its `name` and
#        linked to /<derive>/<id>/.
#
# Only sections whose children are hand-authored pages (the architecture views)
# list their children explicitly, because those pages are not data records.

- title: Browse by Persona
  url: /personas/
  derive: personas

- title: Browse by Problem
  url: /problems/
  derive: problems

- title: Browse by Project
  url: /projects/
  derive: projects

- title: Browse by Artifact
  url: /artifacts/
  derive: artifacts

- title: Browse by Architecture View
  url: /architecture/
  children:
    - title: SLSA v1.2 Threats × OSSF Coverage
      url: /architecture/slsa-threats/
    - title: Secure Production (producer pillar)
      url: /architecture/secure-production/
    - title: Secure Distribution (distributor pillar)
      url: /architecture/secure-distribution/
    - title: Secure Consumption (consumer pillar)
      url: /architecture/secure-consumption/
    - title: Stewardship (other / governance pillar)
      url: /architecture/stewardship/
    - title: Overview — full catalog
      url: /architecture/overview/
    - title: TAC summary
      url: /architecture/tac-summary/
    - title: Architecture gaps
      url: /architecture/gaps/

- title: About
  url: /about/
