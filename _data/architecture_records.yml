  - stage: build
    actor: software-consumer
    status: needs-review
    text: Some consumers run reproducer builds to cross-check Sigstore-signed artefacts; this is a niche flow.
    note: Not the central consumer-facing pattern; confirm if this should be tagged at all.
  - stage: build
    actor: software-distributor
    status: needs-review
    text: Distributors with their own CI may operate Sigstore infrastructure to sign artefacts they republish.
    note: Distributor-side adoption pattern; confirm whether registries operate Sigstore in their own build path.
  - stage: build
    actor: software-producer
    status: confirmed
    text: Cosign and Fulcio let producers sign artefacts at build time with short-lived, identity-bound certificates, replacing the long-lived signing keys traditional CI/CD pipelines need to manage.
  - stage: consumer
    actor: software-consumer
    status: confirmed
    text: Cosign verify (or any Sigstore-compatible verifier) lets consumers prove an artefact's identity at install time without trusting the registry alone.
  - stage: consumer
    actor: software-distributor
    status: needs-review
    text: Some distributors verify signatures as part of admission control before serving downloads.
    note: Distributor-side verification pattern; confirm scope.
  - stage: consumer
    actor: software-producer
    status: needs-review
    text: Producers occasionally verify their own published artefacts during release rehearsal.
    note: Tangential to producer focus; confirm whether to tag.
  - stage: distribution
    actor: software-consumer
    status: confirmed
    text: Consumers receive Sigstore signatures alongside the artefact and can verify them before extraction or install.
  - stage: distribution
    actor: software-distributor
    status: confirmed
    text: Registries (npm, PyPI, container registries) verify Sigstore signatures and surface them to consumers, integrating signed-provenance flows into the distribution layer itself.
  - stage: distribution
    actor: software-producer
    status: confirmed
    text: Producers' Sigstore signatures (and Rekor inclusion proofs) ride with their artefacts through registries, so the signed claim survives intermediate hops in the distribution chain.
  categories: [framework, service]
- id: slsa
