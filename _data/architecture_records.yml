# ARCHITECTURE RECORDS — the projects + working groups overlaid on
# the SDLC × supply-chain-actor matrix on /architecture/* pages.
#
# Each entry:
#   id: matches the slug of the corresponding /projects/<id>/ page
#       in projects.yml when has_community_page is true; otherwise
#       a stable ours-only id imported from the sibling research catalog.
#   name: display name on the pillar pages.
#   kind: project | working-group.
#   has_community_page: when true, the pillar pages wrap the name
#       in <a href='/projects/<id>/'> so it links to the matching page.
#   url: external URL for the upstream project.
#   sdlc_stages: which SDLC stages this record applies to (see
#       sdlc_stages.yml).
#   supply_chain_actors: which actor positions this record applies to
#       (see supply_chain_actors.yml).
#
# Imported 2026-06-28 from the sibling ossf-architecture research catalog.

- id: ai-ml-security
  name: AI/ML Security
  kind: working-group
  has_community_page: false
  url: https://openssf.org/community/openssf-working-groups/
  sdlc_stages: [build, consumer, distribution]
  supply_chain_actors: [software-consumer, software-producer]
  cell_synopses:
  - stage: build
    actor: software-consumer
    status: needs-review
    text: Some ML consumers run derivative builds; the WG's tooling carries forward to them.
    note: Consumer-as-producer pattern; confirm scope.
  - stage: build
    actor: software-producer
    status: confirmed
    text: Coordinates standards and tooling — model signing, attestations, supply-chain hygiene — that ML producers run at training/packaging time.
  - stage: consumer
    actor: software-consumer
    status: needs-review
    text: Consumers apply WG runtime-security guidance when deploying ML systems.
    note: Consumer-runtime focus partially documented; confirm scope.
  - stage: consumer
    actor: software-producer
    status: needs-review
    text: Producers re-evaluate model-runtime security (e.g., prompt injection, adversarial inputs) per WG guidance.
    note: Consumer-runtime focus partially documented; confirm scope.
  - stage: distribution
    actor: software-consumer
    status: needs-review
    text: Consumers verify ML signatures and provenance at fetch time using WG-coordinated tooling.
    note: Same caveat as distribution × producer.
  - stage: distribution
    actor: software-producer
    status: needs-review
    text: Coordinates how signed ML artefacts move through model hubs and registries, mirroring the supply-chain stories on the non-ML side.
    note: Distribution-stage WG focus is implicit in the AI/ML supply chain story; confirm explicit framing.
  categories: [governance]
- id: bear
  name: BEAR (Belonging, Empowerment, Allyship, and Representation)
  kind: working-group
  has_community_page: false
  url: https://openssf.org/community/openssf-working-groups/
  sdlc_stages: [producer]
  supply_chain_actors: [other, software-producer]
  cell_synopses:
  - stage: producer
    actor: other
    status: confirmed
    text: BEAR's work shapes the producer community itself — who feels welcome to participate, how mentorship operates, how representation is improved — rather than any specific technical control.
  - stage: producer
    actor: software-producer
    status: needs-review
    text: Producers benefit downstream from a broader, more sustainable contributor community.
    note: Indirect framing; confirm whether this should be tagged as software-producer at all.
  categories: [governance]
- id: best-practices-badge
  name: Best Practices Badge
  kind: project
  has_community_page: true
  url: https://openssf.org/projects/best-practices-badge/
  sdlc_stages: [producer, source]
  supply_chain_actors: [software-consumer, software-producer]
  cell_synopses:
  - stage: producer
    actor: software-consumer
    status: needs-review
    text: Downstream consumers can read the badge to gauge a project's producer-side hygiene before adoption.
    note: Consumer use is documented anecdotally rather than as a stated programme goal; confirm with upstream.
  - stage: producer
    actor: software-producer
    status: confirmed
    text: Defines a self-assessment programme that maintainers complete on behalf of their own project, encoding what the foundation expects responsible OSS producers to do.
  - stage: source
    actor: software-consumer
    status: needs-review
    text: Consumers use the badge as a screening signal alongside other source-layer metadata.
    note: Consumer-side use of source-layer criteria isn't a stated programme goal; confirm with upstream.
  - stage: source
    actor: software-producer
    status: confirmed
    text: 'Most badge criteria operate at the source-repository layer: branch protection, code review, vulnerability reporting, and CI on commit. The badge effectively codifies source-stage producer hygiene.'
  categories: [best-practices]
- id: best-practices-wg
  name: Best Practices for Open Source Developers
  kind: working-group
  has_community_page: false
  url: https://openssf.org/community/openssf-working-groups/
  sdlc_stages: [producer, source]
  supply_chain_actors: [software-producer]
  cell_synopses:
  - stage: producer
    actor: software-producer
    status: confirmed
    text: 'Educates the producer audience directly: developer training, the Concise Guide, course material, conference workshops.'
  - stage: source
    actor: software-producer
    status: confirmed
    text: Stewards source-layer best-practice work (Scorecard, Best Practices Badge, education materials) targeting open source maintainers and the repos they manage.
  categories: [best-practices, governance]
- id: bomctl
  name: Bomctl
  kind: project
  has_community_page: true
  url: https://openssf.org/projects/bomctl/
  sdlc_stages: [dependencies, distribution]
  supply_chain_actors: [software-consumer, software-producer]
  cell_synopses:
  - stage: dependencies
    actor: software-consumer
    status: confirmed
    text: Consumers feed SBOMs from multiple producers into bomctl to merge, deduplicate, and query the dependency graph of what they've installed.
  - stage: dependencies
    actor: software-producer
    status: confirmed
    text: 'bomctl''s central concern is the SBOM-as-dependency-graph: producers use it to construct, sign, and consolidate the per-component data their downstream consumers need to perform dependency analysis.'
  - stage: distribution
    actor: software-consumer
    status: needs-review
    text: Distributors and consumers can use bomctl to extract or transform SBOMs they received via a registry.
    note: Same caveat as producer; the distribution stage tag is needs-review on the record.
  - stage: distribution
    actor: software-producer
    status: needs-review
    text: Producers use bomctl to manipulate SBOMs (e.g., translate between formats, sign, attach) at release time so the distributed artefact carries the SBOM the consumer expects.
    note: Distribution-stage producer use case; bomctl is currently distribution-tagged needs-review on the record itself.
  categories: [tooling]
- id: criticality-score
  name: Criticality Score
  kind: project
  has_community_page: true
  url: https://openssf.org/projects/criticality-score/
  sdlc_stages: [dependencies]
  supply_chain_actors: [other, software-consumer]
  cell_synopses:
  - stage: dependencies
    actor: other
    status: needs-review
    text: Funders and policy bodies use criticality scores to direct support to projects whose compromise would have outsized impact.
    note: Funder / policy framing is documented in Alpha-Omega material; confirm direct upstream statement.
  - stage: dependencies
    actor: software-consumer
    status: confirmed
    text: Identifies the most critical OSS dependencies in an ecosystem (by influence and downstream reach) so consumers can prioritise auditing, monitoring, and Alpha-Omega-style investment.
  categories: [tooling]
- id: fuzz-introspector
  name: Fuzz Introspector
  kind: project
  has_community_page: true
  url: https://openssf.org/projects/fuzz-introspector/
  sdlc_stages: [build, source]
  supply_chain_actors: [software-producer]
  cell_synopses:
  - stage: build
    actor: software-producer
    status: needs-review
    text: Fuzz Introspector typically runs inside the producer's CI/build pipeline alongside the fuzzer itself, where its reports are generated.
    note: The build-stage placement is a deployment-pattern observation, not a stated upstream scope; confirm.
  - stage: source
    actor: software-producer
    status: confirmed
    text: Analyses the source code of fuzz harnesses (and the code they exercise) to expose untouched reachability, helping producers improve harness coverage rather than running fuzzers blind.
  categories: [tooling]
- id: fuzzingbrain
  name: FuzzingBrain
  kind: project
  has_community_page: true
  url: https://docs.google.com/document/d/1OxjsWHO2v8SfzG4KkqyJEAy8yn1GA1yjgN7QCm6q85Q/edit
  sdlc_stages: [source]
  supply_chain_actors: [software-producer]
  cell_synopses:
  - stage: source
    actor: software-producer
    status: needs-review
    text: 'Provisional: fuzzing-related projects historically operate on producer-controlled source repositories. Awaiting public docs to confirm the exact source-stage role.'
    note: Formation-stage project; upstream documentation not yet available.
  categories: [tooling]
- id: gemara
  name: Gemara
  kind: project
  has_community_page: true
  url: https://openssf.org/projects/gemara/
  sdlc_stages: [source]
  supply_chain_actors: [other, software-producer]
  cell_synopses:
  - stage: source
    actor: other
    status: needs-review
    text: Gemara models the categorical governance controls a project commits to in its repository (e.g., release policy, dependency policy, vulnerability disclosure) so reviewers and auditors can compare
      across projects on the same axes.
    note: Gemara's framing as repo-anchored governance modelling is recent; confirm scope with the project.
  - stage: source
    actor: software-producer
    status: needs-review
    text: Producers use Gemara to express their project's governance commitments in machine-readable form alongside the source they control.
    note: Producer-side adoption is the design intent but documentation is sparse; confirm with upstream.
  categories: [specification]
- id: gittuf
  name: gittuf
  kind: project
  has_community_page: true
  url: https://openssf.org/projects/gittuf/
  sdlc_stages: [source]
  supply_chain_actors: [software-producer]
  cell_synopses:
  - stage: source
    actor: software-producer
    status: confirmed
    text: 'Applies TUF-style signed metadata to a Git repository: refs, tags, and the policy that determines who can write what. Producers gain cryptographic attestation that the code they committed is
      the code being built, mitigating source-forge compromise.'
  categories: [specification]
- id: global-cyber-policy
  name: Global Cyber Policy
  kind: working-group
  has_community_page: false
  url: https://openssf.org/community/openssf-working-groups/
  sdlc_stages: [producer]
  supply_chain_actors: [other]
  cell_synopses:
  - stage: producer
    actor: other
    status: needs-review
    text: Tracks legislative and regulatory developments that shape the constraints open source producers operate under (NIS2, CRA, similar regimes).
    note: SDLC-stage tagging is a shoehorn per the constitution v1.1.0 note on governance records; confirm whether persona/stage placement should evolve.
  categories: [governance]
- id: governing-board
  name: OpenSSF Governing Board
  kind: working-group
  has_community_page: false
  url: https://openssf.org/about/board/
  sdlc_stages: [producer]
  supply_chain_actors: [other]
  cell_synopses:
  - stage: producer
    actor: other
    status: confirmed
    text: 'Strategic and resourcing oversight for the OpenSSF: priorities, funding, member engagement, public posture. Sets the scope within which the technical work happens.'
  categories: [governance]
- id: guac
  name: GUAC
  kind: project
  has_community_page: true
  url: https://openssf.org/projects/guac/
  sdlc_stages: [consumer, dependencies]
  supply_chain_actors: [software-consumer, software-producer]
  cell_synopses:
  - stage: consumer
    actor: software-consumer
    status: needs-review
    text: Consumers query GUAC at evaluation time (or as a periodic job) to triage their dependency graph against the latest vulnerability data.
    note: The consumer-runtime tag overlaps with the dependencies-stage tag; both currently apply but the framing differs.
  - stage: consumer
    actor: software-producer
    status: needs-review
    text: Producers running their own GUAC instance also query it at evaluation time for their own outbound risk.
    note: Loosely fits the consumer stage; confirm whether this is a separate cell from dependencies × producer.
  - stage: dependencies
    actor: software-consumer
    status: confirmed
    text: GUAC ingests SBOMs, vulnerabilities, provenance, and other supply-chain metadata into a unified graph so consumers can ask 'what depends on this?' and 'what is exploitable for me?' without stitching
      the data themselves.
  - stage: dependencies
    actor: software-producer
    status: needs-review
    text: Producers can ingest their own SBOMs into a GUAC instance for outbound impact analysis on disclosures.
    note: Producer use case is documented but less central than consumer-side analysis; confirm with upstream.
  relationships:
  - target: sbom
    kind: consumes
    status: confirmed
  - target: slsa-provenance
    kind: consumes
    status: confirmed
  categories: [tooling]
- id: in-toto
  name: in-toto
  kind: project
  has_community_page: true
  url: https://in-toto.io/
  sdlc_stages: [build]
  supply_chain_actors: [software-producer]
  relationships:
  - target: in-toto-attestation
    kind: produces
    status: confirmed
  categories: [specification]
- id: minder
  name: Minder
  kind: project
  has_community_page: true
  url: https://openssf.org/projects/minder/
  sdlc_stages: [source]
  supply_chain_actors: [other, software-producer]
  cell_synopses:
  - stage: source
    actor: other
    status: needs-review
    text: Compliance and security teams use Minder to express their corporate posture as enforceable policy on the source layer.
    note: Compliance-team framing is documented in marketing material; confirm specific upstream framing.
  - stage: source
    actor: software-producer
    status: confirmed
    text: Continuously enforces policy across a producer's source repositories — branch protection, dependency review, secret scanning, vulnerability response — so the producer's policy is the actual policy
      on every repo, not just the intended one.
  categories: [tooling]
- id: open-bao
  name: OpenBao
  kind: project
  has_community_page: true
  url: https://openssf.org/projects/openbao/
  sdlc_stages: [build, consumer]
  supply_chain_actors: [software-consumer, software-producer]
  cell_synopses:
  - stage: build
    actor: software-consumer
    status: needs-review
    text: A few consumer-operated build platforms also consume OpenBao for the build secrets they ingest.
    note: Less common than producer-side build use; confirm whether to tag.
  - stage: build
    actor: software-producer
    status: needs-review
    text: Producers' build pipelines fetch credentials, signing keys, and short-lived tokens from OpenBao at build time so secret material never lives in the build environment longer than the job needs
      it.
    note: Build-stage role is the dominant deployment pattern but isn't framed as OpenBao's central concern by upstream.
  - stage: consumer
    actor: software-consumer
    status: confirmed
    text: Application operators (downstream consumers of the OpenBao image) deploy it to manage their own runtime secrets, key rotation, and certificate issuance.
  - stage: consumer
    actor: software-producer
    status: confirmed
    text: Producers run OpenBao to manage the secrets their applications consume at runtime, replacing static configuration with short-lived, audited credential leases.
  categories: [tooling]
- id: openssf-model-signing
  name: OpenSSF Model Signing
  kind: project
  has_community_page: true
  url: https://openssf.org/projects/model-signing/
  sdlc_stages: [build, distribution]
  supply_chain_actors: [software-consumer, software-producer]
  cell_synopses:
  - stage: build
    actor: software-consumer
    status: needs-review
    text: ML consumers who build derived models (fine-tuning, distillation) themselves take on the producer role and re-sign the derivative — a build-stage flow on the consumer side.
    note: Consumer-as-producer pattern is real for ML but not the documented central use case; confirm.
  - stage: build
    actor: software-producer
    status: confirmed
    text: ML producers run the model-signing CLI/library as part of their model-publication pipeline, producing a signed manifest over the model artefacts and binding it to a Sigstore identity.
  - stage: distribution
    actor: software-consumer
    status: confirmed
    text: Consumers verify model signatures before loading, defending against tampered weights from compromised mirrors or model hubs.
  - stage: distribution
    actor: software-producer
    status: confirmed
    text: Signed model manifests travel with the model through Hugging Face, registries, and other ML distribution channels, so the signature is available wherever the model is fetched.
  categories: [specification]
- id: openssf-scorecard
  name: OpenSSF Scorecard
  kind: project
  has_community_page: true
  url: https://openssf.org/projects/scorecard/
  sdlc_stages: [build, source]
  supply_chain_actors: [software-consumer, software-producer]
  cell_synopses:
  - stage: build
    actor: software-consumer
    status: needs-review
    text: Consumers reading a Scorecard report see build-stage signals (signed releases, packaging) alongside source-stage signals.
    note: Scorecard's build-stage coverage is partial within its overall check set; framing depends on which checks the consumer cares about.
  - stage: build
    actor: software-producer
    status: needs-review
    text: A subset of checks (Signed-Releases, Packaging, Token-Permissions, CI-Tests) reaches into the build/release stage, so a producer who runs Scorecard sees flags on build-stage hygiene too.
    note: Scorecard's build-stage coverage is partial; framing depends on which checks the producer cares about.
  - stage: source
    actor: software-consumer
    status: confirmed
    text: 'Consumers use Scorecard scores as a fast screening signal when evaluating a third-party dependency: a low score on Code-Review or Branch-Protection means the producer hasn''t hardened the supply-chain
      entry.'
  - stage: source
    actor: software-producer
    status: confirmed
    text: Runs automated checks against a project's source repository — branch protection, code review, dependency-update, vulnerability scanning, etc. — and assigns each a per-check score so the producer
      can spot gaps.
  relationships:
  - target: osv-record
    kind: consumes
    status: needs-review
    note: Scorecard reads vulnerability data via the OSV API; whether that counts as consuming OSV records or only querying the database is a curator judgement call.
  - target: sarif
    kind: produces
    status: confirmed
  categories: [tooling]
- id: orbit
  name: ORBIT (Open Resources for Baselines, Interoperability, and Tooling)
  kind: working-group
  has_community_page: false
  url: https://openssf.org/community/openssf-working-groups/
  sdlc_stages: [producer, source]
  supply_chain_actors: [other, software-producer]
  cell_synopses:
  - stage: producer
    actor: other
    status: confirmed
    text: Auditors and compliance teams reach back to producer-stage practices when grading a project against the Baseline.
  - stage: producer
    actor: software-producer
    status: confirmed
    text: Producer-stage guidance (development practices, contributor hygiene, supported toolchain) sits alongside the source-layer criteria.
  - stage: source
    actor: other
    status: confirmed
    text: Compliance/risk reviewers use ORBIT-coordinated material to map repository evidence to international frameworks and regulations.
  - stage: source
    actor: software-producer
    status: confirmed
    text: Stewards the OSPS Baseline and the source-layer evidence-gathering tooling producers run to demonstrate conformance.
  categories: [governance]
- id: osps-baseline
  name: OSPS Baseline
  kind: project
  has_community_page: true
  url: https://openssf.org/projects/osps-baseline/
  sdlc_stages: [producer, source]
  supply_chain_actors: [other, software-producer]
  cell_synopses:
  - stage: producer
    actor: other
    status: needs-review
    text: Compliance and governance reviewers use the Baseline as an audit checklist when scoring producer-side practices.
    note: Compliance/audit use pattern is documented in ORBIT material; confirm specific framing.
  - stage: producer
    actor: software-producer
    status: confirmed
    text: Defines the minimum set of practices an OSS project's maintainers MUST adopt on their development environment and project setup (account hygiene, signing, secret handling, supported toolchain).
      Acts as the producer-stage 'floor'.
  - stage: source
    actor: other
    status: needs-review
    text: Compliance and governance reviewers map repo-level evidence to specific Baseline criteria when grading a project.
    note: Same caveat as producer × other; confirm with the ORBIT WG.
  - stage: source
    actor: software-producer
    status: confirmed
    text: Baseline requirements that anchor at the repository — branch protection, signed commits, vulnerability disclosure metadata, contribution policies — live here and are graded by ORBIT-aligned tooling.
  categories: [best-practices, specification]
- id: oss-crs
  name: OSS-CRS
  kind: project
  has_community_page: true
  url: https://openssf.org/projects/oss-crs/
  sdlc_stages: [source]
  supply_chain_actors: [software-producer]
  cell_synopses:
  - stage: source
    actor: software-producer
    status: needs-review
    text: OSS-CRS uses LLM-based reasoning to find and propose fixes for bugs in open source code, operating directly on the producer's source repository.
    note: Sandbox-stage project; framing is in flux as the framework matures.
  categories: [specification]
- id: osv-openvex
  name: OpenVEX
  kind: project
  has_community_page: true
  url: https://openssf.org/projects/openvex/
  sdlc_stages: [consumer, dependencies]
  supply_chain_actors: [software-consumer, software-distributor, software-producer]
  cell_synopses:
  - stage: dependencies
    actor: software-consumer
    status: confirmed
    text: Standardises the format of vulnerability data so consumers can ingest advisories from multiple databases (OSV.dev, GHSA, distro feeds) into a single deduplicated view over their dependencies.
  - stage: dependencies
    actor: software-distributor
    status: confirmed
    text: Package registries (npm, PyPI, distros) publish vulnerability information in OSV format so downstream consumers can consume it without per-source adapters.
  - stage: dependencies
    actor: software-producer
    status: needs-review
    text: Producers publish OSV records (often via their security advisory in the source repo) so downstream consumers see a vulnerability in a standard shape.
    note: Producer-side publishing is a real flow; confirm specific upstream framing.
  categories: [data-source, specification]
- id: osv-record
  name: OSV Record (vulnerability record format)
  kind: artifact
  has_community_page: true
  url: https://ossf.github.io/osv-schema/
  sdlc_stages: [dependencies]
  supply_chain_actors: [software-consumer]
  relationships:
  - target: osv-openvex
    kind: extends
    status: confirmed
    note: The artifact (the record format itself) is the concrete instance of what the OSV Schema project specifies.
  categories: [data-source, specification]
- id: package-analysis
  name: Package Analysis
  kind: project
  has_community_page: true
  url: https://openssf.org/projects/package-analysis/
  sdlc_stages: [dependencies, distribution]
  supply_chain_actors: [software-consumer, software-distributor]
  cell_synopses:
  - stage: dependencies
    actor: software-consumer
    status: confirmed
    text: Consumers see fewer compromised dependencies in their graphs because Package Analysis flags malicious behaviour at upstream registries.
  - stage: dependencies
    actor: software-distributor
    status: confirmed
    text: Targets dependency-confusion and typosquat attacks at the distribution layer — vectors that exploit the dependency-resolution flow rather than the package itself.
  - stage: distribution
    actor: software-consumer
    status: confirmed
    text: 'Consumers benefit indirectly: a registry that runs Package Analysis catches malicious packages before they reach the consumer''s install step.'
  - stage: distribution
    actor: software-distributor
    status: confirmed
    text: Runs static and dynamic analysis on packages newly published to a registry, so the registry can detect malicious behaviour (network exfiltration, credential theft, backdoors) before consumers
      download them.
  categories: [data-source, tooling]
- id: protobom
  name: Protobom
  kind: project
  has_community_page: true
  url: https://openssf.org/projects/protobom/
  sdlc_stages: [build, distribution]
  supply_chain_actors: [software-consumer, software-producer]
  cell_synopses:
  - stage: build
    actor: software-consumer
    status: confirmed
    text: Consumers that build derived artefacts (final binaries, container images) emit their own SBOMs at build time via the same library.
  - stage: build
    actor: software-producer
    status: confirmed
    text: Producers generate SBOMs via Protobom-backed tools as part of the build, getting format-agnostic SBOM emission (CycloneDX, SPDX) from one library.
  - stage: distribution
    actor: software-consumer
    status: needs-review
    text: Distributors and consumers read those SBOMs via Protobom on receipt, decoupling the consumer's tooling from the producer's chosen format.
    note: Same caveat as the producer × distribution cell.
  - stage: distribution
    actor: software-producer
    status: needs-review
    text: Producers' build-time SBOMs are attached to the artefact and travel through distribution channels.
    note: Distribution-stage tag is a flow observation, not Protobom's stated central scope.
  categories: [specification, tooling]
- id: rstuf
  name: Repository Service for TUF
  kind: project
  has_community_page: true
  url: https://openssf.org/projects/repository-service-for-tuf/
  sdlc_stages: [distribution]
  supply_chain_actors: [software-consumer, software-distributor]
  cell_synopses:
  - stage: distribution
    actor: software-consumer
    status: confirmed
    text: Consumers' TUF clients verify RSTUF metadata before accepting an artefact, defending against compromised registries and downgrade attacks.
  - stage: distribution
    actor: software-distributor
    status: confirmed
    text: Registries and mirrors run RSTUF to add TUF-style signed metadata over the artefacts they serve, so downstream clients can detect tampering between the registry and themselves.
  categories: [tooling]
- id: sarif
  name: SARIF
  kind: artifact
  has_community_page: true
  url: https://docs.oasis-open.org/sarif/sarif/v2.1.0/sarif-v2.1.0.html
  sdlc_stages: [source]
  supply_chain_actors: [software-producer]
  categories: [specification]
- id: sbom
  name: Software Bill of Materials
  kind: artifact
  has_community_page: true
  url: https://www.cisa.gov/sbom
  sdlc_stages: [consumer, distribution]
  supply_chain_actors: [software-consumer, software-distributor]
  categories: [specification]
- id: sbomit
  name: SBOMit
  kind: project
  has_community_page: true
  url: https://openssf.org/projects/sbomit/
  sdlc_stages: [build, distribution]
  supply_chain_actors: [software-consumer, software-producer]
  cell_synopses:
  - stage: build
    actor: software-consumer
    status: confirmed
    text: Consumers building their own artefacts on top of SBOMit-using producers inherit the same attestation flow.
  - stage: build
    actor: software-producer
    status: confirmed
    text: Producers integrate SBOMit into the build pipeline to attest the components observed at build time (per the in-toto attestation model), tying the SBOM cryptographically to what the build actually
      consumed.
  - stage: distribution
    actor: software-consumer
    status: needs-review
    text: Consumers receive the attested SBOM via the distribution channel and verify it before trusting the dependency list.
    note: Same caveat as producer × distribution.
  - stage: distribution
    actor: software-producer
    status: needs-review
    text: Producers' attested SBOMs ride with the artefact through distribution channels, so consumers receive both the SBOM and the attestation that ties it to the build.
    note: Distribution-stage tag is a flow observation; framing depends on whether the attestation is detached or inline.
