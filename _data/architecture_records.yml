  cell_synopses:
  - stage: build
    actor: software-consumer
    status: confirmed
    text: Consumers verify SLSA provenance against expectations (expected source, expected builder, expected parameters) to detect tampering between the build and the artefact they install.
  - stage: build
    actor: software-producer
    status: confirmed
    text: Build levels L1–L3 mandate that producers generate signed build provenance (typically in-toto attestations) capturing the source, build platform, and build inputs that produced each artefact.
  - stage: distribution
    actor: software-consumer
    status: needs-review
    text: Consumers fetch the provenance alongside the artefact from the distribution channel and chain it back to the build.
    note: Distribution-stage role for consumers is implicit; confirm framing with upstream.
  - stage: distribution
    actor: software-producer
    status: needs-review
    text: Producers ensure provenance travels with the artefact through their distribution channels (registries, mirrors) so the consumer-side verification step can find it.
    note: Distribution-stage role is implicit in SLSA Build L1+ but not framed as a separate producer obligation by the spec.
  relationships:
  - target: slsa-provenance
    kind: produces
    status: confirmed
    note: Conforming SLSA build-track implementations emit signed SLSA Provenance for every artefact they produce.
